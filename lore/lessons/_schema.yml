# Strojově čitelné schéma frontmatteru pro lore/lessons/*.md
# Validovatelné jako JSON Schema (draft-07) přes ajv, jsonschema apod.
# Lidská reference v sloupci "purpose".
#
# schema_version: 1.1
# Změny od 1.0:
#   - type enum: přidána hodnota "principle" (iter-002)
#   - type enum: přejmenována "decision" → "decision-minor" (iter-002, S-001 fix)
#   - povinné pole schema_version přidáno (iter-002)
#   - volitelná pole: title, summary, projects, conflict_status (iter-002)

$schema: "https://json-schema.org/draft-07/schema#"
title: lesson-frontmatter
description: >
  Frontmatter atomické lekce. Identifikátor lekce = název souboru
  ve tvaru YYYY-MM-DD-<slug>.md; není duplikován uvnitř souboru,
  aby zápis nevyžadoval znalost celé báze.

type: object
additionalProperties: false

required:
  - date
  - type
  - tags
  - schema_version

properties:

  date:
    type: string
    pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}$"
    purpose: "Datum zápisu (ISO 8601). Časová osa pro řazení i graf DB."

  type:
    type: string
    enum:
      - gotcha          # technická past, nečekané chování systému
      - anti-pattern    # postup, který vypadá rozumně, ale škodí
      - preference      # subjektivní volba týmu, není absolutní pravda
      - decision-minor  # vědomé rozhodnutí BEZ alternativ a statusu (pro ADR použij decisions/)
      - heuristika      # pravidlo palce, platí často ale ne vždy
      - principle       # trvalá heuristika / axiom; bez confidence pole
    purpose: "Klasifikace lekce. Primární filtr."

  tags:
    type: array
    minItems: 1
    items:
      type: string
      pattern: "^[a-z0-9][a-z0-9-]*$"
    purpose: "Volné štítky (kebab-case) pro vyhledávání bez hierarchie."

  schema_version:
    type: string
    pattern: "^[0-9]+\\.[0-9]+$"
    purpose: "Verze schématu ve formátu MAJOR.MINOR (např. '1.0'). Povinné od iter-002."

  title:
    type: string
    purpose: "Lidsky čitelný název lekce (max 1 řádek)."

  summary:
    type: string
    maxLength: 500
    purpose: "Shrnutí do 500 znaků — rychlé skenování bez čtení těla."

  confidence:
    type: string
    enum: [low, medium, high]
    purpose: "Subjektivní jistota; vstup pro řešení konfliktů. Nepoužívat pro type: principle."

  author:
    type: string
    purpose: "Jméno člověka nebo identifikátor agenta. Stopa původu."

  context:
    type: string
    maxLength: 500
    purpose: "1–3 věty o tom, kde/jak lekce vznikla."

  source_project:
    type: string
    purpose: "Projekt, kde lekce vznikla (provenance). Doplněk k projects[]."

  projects:
    type: array
    items:
      type: string
    purpose: "Projekty, kde je lekce relevantní. Cross-ref jako lore/projects/<slug>."

  related:
    type: array
    items:
      type: string
    purpose: >
      Cross-reference na jiné záznamy. Formát: lore/<type>/<slug> (kanonický)
      nebo holý slug pro same-type (zkrácený). Hrana grafu RELATED_TO.

  conflict:
    type: array
    items:
      type: string
    purpose: "Explicitní rozpor s jiným záznamem. Formát: lore/<type>/<slug>."

  conflict_status:
    type: string
    enum: [open, acknowledged, resolved, superseded]
    purpose: "Stav konfliktu. Přítomno jen pokud je vyplněno pole conflict."

  deprecated:
    type: boolean
    purpose: "true = záznam je zastaralý. Nikdy nesmazat, jen označit."

  superseded_by:
    type: string
    purpose: "Nástupce tohoto záznamu. Formát: lore/<type>/<slug>."
