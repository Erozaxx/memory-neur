# Strojově čitelné schéma frontmatteru pro lore/lessons/*.md
# Validovatelné jako JSON Schema (draft-07) přes ajv, jsonschema apod.
# Lidská reference v sloupci "purpose".

$schema: "https://json-schema.org/draft-07/schema#"
title: lesson-frontmatter
description: >
  Frontmatter atomické lekce. Identifikátor lekce = název souboru
  ve tvaru YYYY-MM-DD-<slug>.md; není duplikován uvnitř souboru,
  aby zápis nevyžadoval znalost celé báze.

type: object
additionalProperties: false

required:
  - date
  - type
  - tags

properties:

  date:
    type: string
    pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}$"
    purpose: "Datum zápisu (ISO 8601). Časová osa pro řazení i graf DB."

  type:
    type: string
    enum:
      - gotcha          # technická past, nečekané chování systému
      - anti-pattern    # postup, který vypadá rozumně, ale škodí
      - preference      # subjektivní volba týmu, není absolutní pravda
      - decision        # vědomé rozhodnutí se zdůvodněním
      - heuristika      # pravidlo palce, platí často ale ne vždy
    purpose: "Klasifikace lekce. Primární filtr."

  tags:
    type: array
    minItems: 1
    items:
      type: string
      pattern: "^[a-z0-9][a-z0-9-]*$"
    purpose: "Volné štítky (kebab-case) pro vyhledávání bez hierarchie."

  confidence:
    type: string
    enum: [low, medium, high]
    purpose: "Subjektivní jistota; vstup pro řešení konfliktů."

  related:
    type: array
    items:
      type: string
    purpose: >
      Slug nebo relativní cesta jiné lekce. Hrana grafu typu „souvisí s".
      Vyplňuje se postupně — prázdné při zápisu je v pořádku.

  context:
    type: string
    maxLength: 500
    purpose: "1–3 věty o tom, kde/jak lekce vznikla."

  source_project:
    type: string
    purpose: "Projekt, ze kterého byla lekce konsolidována."

  conflict:
    type: array
    items:
      type: string
    purpose: "Explicitní rozpor s jinou lekcí (slug / cesta)."

  author:
    type: string
    purpose: "Jméno člověka nebo identifikátor agenta. Stopa původu."
