# Strojově čitelné schéma frontmatteru pro lore/projects/*.md
# Referencovatelný kontext projektu — ne operativní stav.
#
# schema_version: 1.0

$schema: "https://json-schema.org/draft-07/schema#"
title: project-frontmatter
description: >
  Frontmatter záznamu projektu. Identifikátor = název souboru <slug>.md.
  Bez date-prefix — projekt je entita, ne událost.

type: object
additionalProperties: false

required:
  - date
  - type
  - tags
  - schema_version
  - status

properties:

  date:
    type: string
    pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}$"
    purpose: "Datum zahájení nebo prvního záznamu projektu (ISO 8601)."

  type:
    type: string
    enum:
      - internal    # interní projekt organizace nebo týmu
      - client      # klientský projekt pro externího zákazníka
      - oss         # open-source projekt
      - experiment  # experimentální projekt, spike, PoC
    purpose: "Kategorie projektu."

  tags:
    type: array
    minItems: 1
    items:
      type: string
      pattern: "^[a-z0-9][a-z0-9-]*$"
    purpose: "Volné štítky (kebab-case)."

  schema_version:
    type: string
    pattern: "^[0-9]+\\.[0-9]+$"
    purpose: "Verze schématu ve formátu MAJOR.MINOR."

  status:
    type: string
    enum: [active, paused, completed, abandoned]
    purpose: "Stav projektu. active=běží, paused=pozastaveno, completed=hotovo, abandoned=zrušeno."

  title:
    type: string
    purpose: "Lidsky čitelný název projektu."

  summary:
    type: string
    maxLength: 500
    purpose: "Shrnutí projektu do 500 znaků."

  started:
    type: string
    pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}$"
    purpose: "Datum zahájení (pokud jiné od date). ISO 8601."

  ended:
    type: string
    pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}$"
    purpose: "Datum ukončení. ISO 8601."

  team:
    type: array
    items:
      type: string
    purpose: "Členové týmu — lore/personas/<slug> nebo volná jména."

  lessons:
    type: array
    items:
      type: string
    purpose: "Lekce získané z projektu. Formát: lore/lessons/<slug>. Hrana PRODUCED_LESSON."

  decisions:
    type: array
    items:
      type: string
    purpose: "Rozhodnutí projektu. Formát: lore/decisions/<slug>. Hrana CONTAINS_DECISION."

  repo_url:
    type: string
    purpose: "URL repozitáře projektu."

  author:
    type: string
    purpose: "Jméno člověka nebo identifikátor agenta."

  context:
    type: string
    purpose: "1–3 věty o kontextu projektu."

  related:
    type: array
    items:
      type: string
    purpose: "Cross-reference. Formát: lore/<type>/<slug>."

  deprecated:
    type: boolean
    purpose: "true = zastaralý záznam. Nikdy nesmazat."

  superseded_by:
    type: string
    purpose: "Nástupce. Formát: lore/projects/<slug>."
