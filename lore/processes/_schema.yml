# Strojově čitelné schéma frontmatteru pro lore/processes/*.md
# Opakující se procedury, workflows, checklisty.
#
# schema_version: 1.0

$schema: "https://json-schema.org/draft-07/schema#"
title: process-frontmatter
description: >
  Frontmatter záznamu procesu. Identifikátor = název souboru <slug>.md.
  Bez date-prefix — proces je živý dokument, verziovaný přes git.

type: object
additionalProperties: false

required:
  - date
  - type
  - tags
  - schema_version
  - status

properties:

  date:
    type: string
    pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}$"
    purpose: "Datum první formulace procesu (ISO 8601)."

  type:
    type: string
    enum:
      - workflow     # sekvenční nebo větvený postup (např. deployment workflow)
      - checklist    # kontrolní seznam kroků (např. pre-release checklist)
      - ritual       # opakující se ceremonie (např. weekly review, retrospektiva)
      - automation   # automatizovaný proces spouštěný skriptem nebo CI
    purpose: "Kategorie procesu."

  tags:
    type: array
    minItems: 1
    items:
      type: string
      pattern: "^[a-z0-9][a-z0-9-]*$"
    purpose: "Volné štítky (kebab-case)."

  schema_version:
    type: string
    pattern: "^[0-9]+\\.[0-9]+$"
    purpose: "Verze schématu ve formátu MAJOR.MINOR."

  status:
    type: string
    enum: [active, draft, deprecated]
    purpose: "Stav procesu. active=používaný, draft=návrh, deprecated=zastaralý."

  title:
    type: string
    purpose: "Lidsky čitelný název procesu."

  summary:
    type: string
    maxLength: 500
    purpose: "Shrnutí procesu do 500 znaků."

  trigger:
    type: string
    purpose: "Kdy nebo čím se proces spouští (podmínka, událost, plán)."

  owner:
    type: string
    purpose: "Vlastník procesu — lore/personas/<slug> nebo jméno."

  steps:
    type: array
    items:
      type: string
    purpose: "Ordered list kroků procesu."

  personas:
    type: array
    items:
      type: string
    purpose: "Kdo vykonává — lore/personas/<slug>. Hrana EXECUTED_BY."

  tools:
    type: array
    items:
      type: string
    purpose: "Nástroje a systémy potřebné pro proces."

  related:
    type: array
    items:
      type: string
    purpose: "Cross-reference. Formát: lore/<type>/<slug>."

  context:
    type: string
    purpose: "1–3 věty o kontextu procesu."

  author:
    type: string
    purpose: "Jméno člověka nebo identifikátor agenta."

  deprecated:
    type: boolean
    purpose: "true = zastaralý záznam. Nikdy nesmazat."

  superseded_by:
    type: string
    purpose: "Nástupce. Formát: lore/processes/<slug>."
