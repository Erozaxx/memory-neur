# Strojově čitelné schéma frontmatteru pro lore/decisions/*.md
# ADR-like záznamy s alternativami, kontextem a životním cyklem.
#
# schema_version: 1.0

$schema: "https://json-schema.org/draft-07/schema#"
title: decision-frontmatter
description: >
  Frontmatter rozhodnutí (ADR-like). Identifikátor = název souboru
  ve tvaru YYYY-MM-DD-<slug>.md. Používej pro vědomá rozhodnutí
  s alternativami a statusem — pro drobná rozhodnutí bez alternativ
  použij lore/lessons/ s type: decision-minor.

type: object
additionalProperties: false

required:
  - date
  - type
  - tags
  - schema_version
  - status

properties:

  date:
    type: string
    pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}$"
    purpose: "Datum přijetí rozhodnutí (ISO 8601). Časová osa ADR linky."

  type:
    type: string
    enum:
      - architecture   # rozhodnutí o struktuře systému, technologiích, vzorech
      - product        # rozhodnutí o produktu, feature scope, prioritizaci
      - process        # rozhodnutí o způsobu práce, postupu, workflow
      - tooling        # volba nástroje, knihovny, platformy
      - policy         # pravidlo nebo konvence platná pro tým/projekt
    purpose: "Doména rozhodnutí. Primární filtr."

  tags:
    type: array
    minItems: 1
    items:
      type: string
      pattern: "^[a-z0-9][a-z0-9-]*$"
    purpose: "Volné štítky (kebab-case) pro vyhledávání."

  schema_version:
    type: string
    pattern: "^[0-9]+\\.[0-9]+$"
    purpose: "Verze schématu ve formátu MAJOR.MINOR (např. '1.0')."

  status:
    type: string
    enum: [proposed, active, superseded, deprecated]
    purpose: >
      Životní stav rozhodnutí. Povinné — bez statusu nelze sledovat ADR linku.
      proposed: čeká na schválení / diskuzi
      active: platné a v platnosti
      superseded: nahrazeno jiným rozhodnutím (viz superseded_by)
      deprecated: zastaralé bez nástupce

  title:
    type: string
    purpose: "Lidsky čitelný název rozhodnutí."

  summary:
    type: string
    maxLength: 500
    purpose: "Shrnutí do 500 znaků."

  context:
    type: string
    purpose: "Proč bylo rozhodnutí potřeba — situace, problém, tlak."

  options:
    type: array
    items:
      type: string
    purpose: "Zvažované alternativy (volný text). Hrana grafu ALTERNATIVES."

  rationale:
    type: string
    purpose: "Proč tato volba — zdůvodnění výběru oproti alternativám."

  consequences:
    type: string
    purpose: "Dopad rozhodnutí — co se změní, co se přijme jako trade-off."

  author:
    type: string
    purpose: "Jméno člověka nebo identifikátor agenta."

  related:
    type: array
    items:
      type: string
    purpose: "Cross-reference na jiné záznamy. Formát: lore/<type>/<slug>."

  conflict:
    type: array
    items:
      type: string
    purpose: "Explicitní rozpor s jiným záznamem. Formát: lore/<type>/<slug>."

  conflict_status:
    type: string
    enum: [open, acknowledged, resolved, superseded]
    purpose: "Stav konfliktu. Přítomno jen pokud je vyplněno pole conflict."

  resolved_by:
    type: string
    purpose: "Záznam, který konflikt uzavřel. Formát: lore/decisions/<slug>."

  source_project:
    type: string
    purpose: "Projekt, kde rozhodnutí vzniklo (provenance)."

  deprecated:
    type: boolean
    purpose: "true = zastaralý záznam. Nikdy nesmazat."

  superseded_by:
    type: string
    purpose: "Nástupce. Formát: lore/decisions/<slug>."
